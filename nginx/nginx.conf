events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        # Listen on 80 for ANY domain name provided to the server
        listen 80;
        server_name _; # The '_' is a wildcard catch-all

        # 1. API PROXY
        location /api/ {
            # Standardized internal name for the python container
            proxy_pass http://zenflix-backend:8000/; 
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. FRONTEND PROXY
        location / {
            # Standardized internal name for the react/nextjs container
            proxy_pass http://zenflix-frontend:3000;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Necessary for Next.js features like HMR and WebSockets
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}